name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - uses: actions/checkout@v4

      # Step 2: Set up Java for backend
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      # Step 3: Build backend
      - name: Build backend
        working-directory: teamflow-backend/teamflow-backend
        run: mvn -B clean install -DskipTests

      # Step 4: Set up Node for frontend
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: taskmanage/my-app/package-lock.json

      # Step 5: Build frontend
      - name: Build frontend
        working-directory: taskmanage/my-app
        run: |
          npm ci
          npm run build

      # Step 6: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 7: Build Docker images
      - name: Build Docker images
        run: |
          docker build -t theeksha2207/teamflow-backend:latest ./teamflow-backend/teamflow-backend
          docker build -t theeksha2207/teamflow-frontend:latest ./taskmanage/my-app
